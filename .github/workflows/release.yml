name: Build and Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Generate random release keystore
        run: |
          mkdir -p app/signing
          keytool -genkeypair -v \
            -keystore app/signing/release-random.jks \
            -storepass "r4nd0mStoreP@ss_9x2k" \
            -alias "randomReleaseKey" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=AndroCalc Random Release,O=AndroCalc,C=US"

      - name: Build release APK
        run: gradle assembleRelease

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_id }}
          name: Main build ${{ github.sha }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
